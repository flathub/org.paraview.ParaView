app-id: org.paraview.ParaView
runtime: org.kde.Sdk
sdk: org.kde.Sdk
runtime-version: 6.10
base: io.qt.qtwebengine.BaseApp
base-version: 6.10
rename-icon: paraview
command: paraview
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --share=network
  - --filesystem=home
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - /etc
  - '*.la'
  - '*.a'

# Disable ARM support, ParaView does not support it anyway.
modules:
  - shared-modules/glew/glew.json

  - name: meson
    buildsystem: simple
    build-commands:
      - python3 setup.py build
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: git
        url: https://github.com/mesonbuild/meson.git
        tag: 1.10.1
        commit: 33eb51948be7f15890369f798f150a9f6c21c710
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: OpenBLAS # dependency for numpy
    no-autogen: true
    make-args:
      - DYNAMIC_ARCH=1
      - DYNAMIC_OLDER=1
      - FC=gfortran
      - TARGET=GENERIC
      - USE_OPENMP=0
    make-install-args:
      - PREFIX=/app
    cleanup:
      - /bin
      - /include
      - /lib/cmake
      - /lib/*.a
      - /lib/*.la
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/archive/v0.3.31.tar.gz
        sha512: 703b84c476c148a0922a04b1c33c9c4c452f478d608d93e59204b8f0f2c516344301ff0a4dbb3750a2449db0d28cc2df001c295898e859b41ecb8381f9c2eab8
        x-checker-data:
          type: anitya
          project-id: 2540
          url-template: https://github.com/OpenMathLib/OpenBLAS/archive/v$version.tar.gz

    # python3 flatpak-pip-generator setuptools_scm_git_archive flit-core tomli typing-extensions pyproject_metadata setuptools_scm meson-python numpy certifi pyparsing pillow packaging cppy kiwisolver fonttools cycler pybind11 contourpy python-dateutil pkgconfig pyparsing -o python-deps && fb
  - python-deps.json

  #Copy qhull and freetype to correct dir so matplotlib will not try to download it
  - name: python3-matplotlib
    buildsystem: simple
    build-commands:
      - mkdir -p subprojects/packagecache/
      - cp qhull-8.0.2.tgz freetype-2.6.1.tar.gz subprojects/packagecache/ #Copy qhull and freetype to correct dir so matplotlib will not try to download it
      - python3 -mpip install . --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        --no-build-isolation
    sources:
      - type: file
        url: https://downloads.sourceforge.net/project/freetype/freetype2/2.6.1/freetype-2.6.1.tar.gz
        sha256: 0a3c7dfbda6da1e8fce29232e8e96d987ababbbf71ebc8c75659e4132c367014
        dest-filename: freetype-2.6.1.tar.gz
      - type: file
        dest-filename: qhull-8.0.2.tgz
        url: https://github.com/qhull/qhull/archive/v8.0.2/qhull-8.0.2.tar.gz
        sha256: 8774e9a12c70b0180b95d6b0b563c5aa4bea8d5960c15e18ae3b6d2521d64f8b
      - type: archive
        url: https://files.pythonhosted.org/packages/8a/76/d3c6e3a13fe484ebe7718d14e269c9569c4eb0020a968a327acb3b9a8fe6/matplotlib-3.10.8.tar.gz
        sha256: 2299372c19d56bcd35cf05a2738308758d32b9eaed2371898d8f5bd33f084aa3
        x-checker-data:
          type: pypi
          name: matplotlib

  - name: Boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app
      - ./b2 install cxxflags="$CXXFLAGS" linkflags="$LDFLAGS" -j $FLATPAK_BUILDER_N_JOBS
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
        sha256: 5e93d582aff26868d581a52ae78c7d8edf3f3064742c6e77901a1f18a437eea9
        x-checker-data:
          type: anitya
          project-id: 6845
          stable-only: true
          url-template: https://archives.boost.io/release/${version}/source/boost_${major}_${minor}_${patch}.tar.gz

  - name: hdf5
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_TESTING:BOOL=OFF
      - -DHDF5_BUILD_EXAMPLES:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1.14.6.tar.gz
        sha256: 6df53f84376d87e96eeb255703e3b1a348fc08a48e06e37053f1bfb379970189
        x-checker-data:
          type: anitya
          project-id: 1303
          stable-only: true
          url-template: https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-${version}.tar.gz

  - name: python-h5py
    buildsystem: simple
    build-commands:
      - python3 -mpip install . --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        --no-build-isolation
    sources:
      - type: archive
        url: https://github.com/h5py/h5py/archive/refs/tags/3.15.1.tar.gz
        sha256: 55a03d8fc1db535b243cccda3e6237844da25a17a2df3bc0ea9db6fbbbd7bf2b
        x-checker-data:
          type: anitya
          project-id: 6409
          stable-only: true
          url-template: https://github.com/h5py/h5py/archive/refs/tags/${version}.tar.gz

  - name: netcdf
    sources:
      - type: archive
        url: https://github.com/Unidata/netcdf-c/archive/v4.10.0.tar.gz
        sha256: ce160f9c1483b32d1ba8b7633d7984510259e4e439c48a218b95a023dc02fd4c
        x-checker-data:
          type: anitya
          project-id: 10354
          stable-only: true
          url-template: https://github.com/Unidata/netcdf-c/archive/v${version}.tar.gz

  - name: openmpi
    sources:
      - type: archive
        url: https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.10.tar.bz2
        sha256: 0acecc4fc218e5debdbcb8a41d182c6b0f1d29393015ed763b2a91d5d7374cc6
        x-checker-data:
          type: anitya
          project-id: 2554
          stable-only: true
          url-template: https://download.open-mpi.org/release/open-mpi/v${major}.${minor}/openmpi-${version}.tar.bz2

  - name: TBB
    buildsystem: cmake-ninja
    config-opts:
      - -DTBB_TEST=OFF
      - -DTBB_EXAMPLES=OFF
      - -DTBB_STRICT=OFF
    builddir: true
    sources:
      - type: archive
        url: https://github.com/oneapi-src/oneTBB/archive/refs/tags/v2022.3.0.tar.gz
        sha256: 01598a46c1162c27253a0de0236f520fd8ee8166e9ebb84a4243574f88e6e50a
        x-checker-data:
          type: anitya
          project-id: 8217
          stable-only: true
          url-template: https://github.com/oneapi-src/oneTBB/archive/refs/tags/v$version.tar.gz

  - name: Embree
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DEMBREE_TUTORIALS:BOOL=OFF
      - -DEMBREE_ISPC_SUPPORT:BOOL=ON
    sources:
      - type: archive
        url: https://github.com/embree/embree/archive/refs/tags/v4.4.0.tar.gz
        sha256: acb517b0ea0f4b442235d5331b69f96192c28da6aca5d5dde0cbe40799638d5c
    modules:
      - name: extra-cmake-modules
        buildsystem: cmake-ninja
        sources:
          - type: git
            url: https://invent.kde.org/frameworks/extra-cmake-modules.git
            tag: v5.100.0
        # Attempt to build from source, but ISPC need glic-32bit which make things complicated.
        # OSPRay need ISPC 1.9.2.
      - name: ISPC
        buildsystem: simple
        build-commands:
          - cp bin/ispc /app/bin/
        sources:
          - type: archive
            url: https://github.com/ispc/ispc/releases/download/v1.30.0/ispc-v1.30.0-linux.tar.gz
            sha256: 63e7d61037849fa1ed644f0398d21740ee9f880b9bf81f017c65eebe1d42c02b
      - name: glfw
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          - -DGLFW_USE_WAYLAND:BOOL=ON
          - -DBUILD_SHARED_LIBS:BOOL=ON
          - -DGLFW_BUILD_EXAMPLES:BOOL=OFF
          - -DGLFW_BUILD_TESTS:BOOL=OFF
          - -DGLFW_BUILD_DOCS:BOOL=OFF
        sources:
          - type: archive
            url: https://github.com/glfw/glfw/releases/download/3.3.4/glfw-3.3.4.zip
            sha256: bbd2c42c660b725e9755eb417e40b373f0d4c03138c9b2e210d02cd308bd99cd

  - name: OSPRay
    buildsystem: cmake
    builddir: true
    config-opts:
      # - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DOSPRAY_ENABLE_APPS_BENCHMARK:BOOL=OFF
      - -DOSPRAY_ENABLE_APPS_EXAMPLES:BOOL=OFF
      - -DOSPRAY_ENABLE_APPS_TUTORIALS:BOOL=OFF
      - -DOSPRAY_ENABLE_APPS_TESTING:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/ospray/ospray/archive/refs/tags/v3.2.0.tar.gz
        sha256: 2c8108df2950bc5d1bc2a62f74629233dbe4f36e3f6a8ea032907d4a3fdc6750
    modules:
      - name: rkcommon
        buildsystem: cmake
        builddir: true
        config-opts:
          - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          - -DBUILD_TESTING:BOOL=OFF
        sources:
          - type: archive
            url: https://github.com/ospray/rkcommon/archive/refs/tags/v1.14.0.tar.gz
            sha256: 5aef75afc8d4fccf9e70df4cbdf29a1b28b39ee51b5588b94b83a14c6a166d83
      - name: openvkl
        buildsystem: cmake
        builddir: true
        config-opts:
          - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          - -DBUILD_EXAMPLES:BOOL=OFF
          - -DBUILD_BENCHMARKS:BOOL=OFF
          - -DBUILD_TESTING:BOOL=OFF
        sources:
          - type: archive
            url: https://github.com/openvkl/openvkl/archive/refs/tags/v2.0.1.tar.gz
            sha256: 0c7faa9582a93e93767afdb15a6c9c9ba154af7ee83a6b553705797be5f8af62

  - name: GDAL
    buildsystem: cmake-ninja
    config-opts:
      - -DACCEPT_MISSING_SQLITE3_RTREE:BOOL=ON
      - -DBUILD_TESTING:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/OSGeo/gdal/archive/refs/tags/v3.12.2.tar.gz
        sha256: 1817fa4bd60a98ed4bff06f369a352d994332e63a48be5c15bcee44680fa5ace
        x-checker-data:
          type: anitya
          project-id: 881
          stable-only: true
          url-template: https://github.com/OSGeo/gdal/archive/refs/tags/v$version.tar.gz
    modules:
      - name: PROJ
        buildsystem: cmake-ninja
        config-opts:
          - -DBUILD_TESTING:BOOL=OFF
        sources:
          - type: archive
            url: https://github.com/OSGeo/PROJ/releases/download/9.7.1/proj-9.7.1.tar.gz
            sha256: 6c097dc803c561929cdfcc46e4bf9945ea977611fb31493ad14e88edaeae260f
            x-checker-data:
              type: anitya
              project-id: 9463
              stable-only: true
              url-template: https://github.com/OSGeo/PROJ/releases/download/$version/proj-$version.tar.gz

  - name: GeoTIFF
    builddir: true
    sources:
      - type: archive
        url: https://download.osgeo.org/geotiff/libgeotiff/libgeotiff-1.7.4.tar.gz
        sha256: c598d04fdf2ba25c4352844dafa81dde3f7fd968daa7ad131228cd91e9d3dc47
        x-checker-data:
          type: anitya
          project-id: 21361
          stable-only: true
          url-template: https://download.osgeo.org/geotiff/libgeotiff/libgeotiff-$version.tar.gz

  - name: LASzip
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://github.com/LASzip/LASzip/releases/download/3.4.4/laszip-src-3.4.4.tar.gz
        sha256: 41f826848ff106f471b134224f58075ac8e36a62b6ba0ad75be8a8c191bdba4b
        x-checker-data:
          type: anitya
          project-id: 241499
          stable-only: true
          url-template: https://github.com/LASzip/LASzip/releases/download/$version/laszip-src-$version.tar.gz

  - name: lapack
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DLAPACKE=ON
      - -DCBLAS=ON
    sources:
      - type: archive
        url: https://github.com/Reference-LAPACK/lapack/archive/refs/tags/v3.12.1.tar.gz
        sha256: 2ca6407a001a474d4d4d35f3a61550156050c48016d949f0da0529c0aa052422
        x-checker-data:
          type: anitya
          project-id: 1534
          stable-only: true
          url-template: https://github.com/Reference-LAPACK/lapack/archive/refs/tags/v$version.tar.gz

  - name: Eigen3
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/5.0.1/eigen-5.0.1.tar.bz2
        sha256: e4de6b08f33fd8b8985d2f204381408c660bffa6170ac65b68ae1bd3cd575c0a
        x-checker-data:
          type: anitya
          project-id: 13751
          stable-only: true
          url-template: https://gitlab.com/libeigen/eigen/-/archive/${version}/eigen-${version}.tar.bz2
    cleanup:
      - '*'

  - name: SWIG
    sources:
      - type: git
        url: https://github.com/swig/swig.git
        tag: v4.1.1
        commit: 77323a0f07562b7d90d36181697a72a909b9519a

  - name: OpenTURNS
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/openturns/openturns/archive/refs/tags/v1.26.1.tar.gz
        sha256: 41ddda08a44ea9980e725987669d49448280acb2c8e06d9d279a7321ec9452c0
        x-checker-data:
          type: anitya
          project-id: 220847
          stable-only: true
          url-template: https://github.com/openturns/openturns/archive/refs/tags/v${version}.tar.gz
    cleanup:
      - /share

    # Provide libnuma for MEMKIND
  - name: numactl
    sources:
      - type: archive
        url: https://github.com/numactl/numactl/releases/download/v2.0.19/numactl-2.0.19.tar.gz
        sha256: f2672a0381cb59196e9c246bf8bcc43d5568bc457700a697f1a1df762b9af884
        x-checker-data:
          type: anitya
          project-id: 2507
          stable-only: true
          url-template: https://github.com/numactl/numactl/releases/download/v${version}/numactl-${version}.tar.gz

  - name: ADIOS2
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DADIOS2_RUN_INSTALL_TEST:BOOL=OFF
      - -DADIOS2_BUILD_EXAMPLES=OFF
      - -DBUILD_SHARED_LIBS=ON
      - -DADIOS2_USE_HDF5:STRING=OFF
      - -DBUILD_TESTING:BOOL=OFF
      - -DINSTALL_GTEST:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/ornladios/ADIOS2/archive/refs/tags/v2.11.0.tar.gz
        sha256: 0a2bd745e3f39745f07587e4a5f92d72f12fa0e2be305e7957bdceda03735dbf
        x-checker-data:
          type: anitya
          project-id: 220828
          stable-only: true
          url-template: https://github.com/ornladios/ADIOS2/archive/refs/tags/v${version}.tar.gz

  - name: Catalyst
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_CXX_STANDARD:STRING=14 #Fix error: ‘std::uint64_t’ has not been declared
      - -DCATALYST_BUILD_TESTING:BOOL=OFF
      - -DCATALYST_USE_MPI:BOOL=ON
      - -DCATALYST_WRAP_PYTHON:BOOL=ON
    sources:
      - type: git
        url: https://gitlab.kitware.com/paraview/catalyst
        commit: 777fe7fb5e7e86bacb96908ab33f49eeb2d01cf9

  - name: gmsh
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DENABLE_BUILD_LIB=ON
      - -DENABLE_BUILD_SHARED=ON
      - -DENABLE_BUILD_DYNAMIC=ON
      - -DENABLE_METIS=OFF #dunno why cannot compile
      - -DENABLE_BLAS_LAPACK=ON
      - -DENABLE_MPI:BOOL=ON
    sources:
      - type: archive
        url: https://gmsh.info/src/gmsh-4.15.1-source.tgz
        sha256: eba8e4064f6586c8ca880f1cfdf697f4d70f026f398a93b458f247f7e4364fed
        x-checker-data:
          type: anitya
          project-id: 9575
          stable-only: true
          url-template: https://gmsh.info/src/gmsh-$version-source.tgz

