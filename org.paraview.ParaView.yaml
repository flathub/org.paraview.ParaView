  - name: PDAL
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DWITH_TESTS=OFF
      - -DWITH_TESTS:BOOL=OFF
      - -DWITH_LZMA:BOOL=OFF
      - -DWITH_ZLIB:BOOL=ON
      - -DWITH_ZSTD:BOOL=ON
      - -DBUILD_PLUGIN_HDF:BOOL=OFF
      - -DBUILD_PLUGIN_E57:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/PDAL/PDAL/releases/download/2.8.3/PDAL-2.8.3-src.tar.bz2
        sha256: 13dfdb0d634bdd568b351fd535aaa03f7611df4c2cdb8be938117751355ad09b
        # New update need c++14 https://gitlab.kitware.com/vtk/vtk/-/issues/19189
        # Until paraview use c++11 we stay on this version
        # x-checker-data:
        #   type: anitya
        #   project-id: 138228
        #   stable-only: true
        #   url-template: https://github.com/PDAL/PDAL/releases/download/$version/PDAL-$version-src.tar.bz2

  - name: Imath
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING:BOOL=OFF
    sources:
      - type: git
        url: https://github.com/AcademySoftwareFoundation/Imath.git
        tag: v3.2.2
        commit: 1e480d11cb98b032a2dece9b9a8730512effc7f6
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d.]+)$

  - name: Alembic
    buildsystem: cmake-ninja
    config-opts:
      - -DUSE_TESTS:BOOL=OFF
      - -DUSE_HDF5:BOOL=ON
    sources:
      - type: archive
        url: https://github.com/alembic/alembic/archive/refs/tags/1.8.10.tar.gz
        sha256: 06c9172faf29e9fdebb7be99621ca18b32b474f8e481238a159c87d16b298553
        x-checker-data:
          type: anitya
          project-id: 13980
          stable-only: true
          url-template: https://github.com/alembic/alembic/archive/refs/tags/$version.tar.gz

  - name: tcl
    buildsystem: autotools
    subdir: unix
    config-opts:
        - --enable-threads
        - --enable-shared
    post-install:
        - chmod 755 /app/lib/libtcl*.so
    sources:
        - type: archive
          url: https://github.com/tcltk/tcl/archive/refs/tags/core-8-6-15.tar.gz
          sha256: 26ec488cef5b9cd71a3290c257e40c2157fc258cad248f71404db56db8a016d1
  - name: tk
    buildsystem: autotools
    subdir: unix
    post-install:
        - chmod +w ${FLATPAK_DEST}/lib/libtk*.so
        - ln -sf /app/bin/wish8.6 /app/bin/wish
    sources:
        - type: archive
          url: https://github.com/tcltk/tk/archive/refs/tags/core-8-6-15.tar.gz
          sha256: 11e852b69ce749e5a0f17d00c0a9147b22c6140f200a84a0f3df1c329e71823f
        - type: patch
          path: tk_skip_missing_tcl_man_macros.patch

  - name: OCCT
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      # - -DBUILD_MODULE_Draw:BOOL=OFF
    sources:
      - type: git
        url: https://github.com/Open-Cascade-SAS/OCCT
        tag: V7_8_1
        commit: bd2a789f15235755ce4d1a3b07379a2e062fdc2e
      - type: patch
        path: freetype_use_unsigned_point_and_contour.patch

  - name: Paraview
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      cflags: -I/app/include/eigen3
      cxxflags: -I/app/include/eigen3
    config-opts:
      - -DCMAKE_BUILD_TYPE:STRING=Release
      - -DPARAVIEW_BUILD_DEVELOPER_DOCUMENTATION:BOOL=OFF
      - -DPARAVIEW_BUILD_LEGACY_REMOVE:BOOL=OFF
      - -DPARAVIEW_BUILD_LEGACY_SILENT:BOOL=OFF
      - -DPARAVIEW_BUILD_SHARED_LIBS:BOOL=ON
      - -DPARAVIEW_BUILD_TESTING:STRING=OFF
      - -DPARAVIEW_BUILD_WITH_EXTERNAL:BOOL=OFF
